<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏁 My HYROX Training Plan</title>
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #fde8ef;
    --pink-dark: #f5b8cb;
    --pink-accent: #e0708f;
    --yellow: #fff8e1;
    --yellow-dark: #ffe082;
    --yellow-accent: #f4b942;
    --blue: #e3f0fd;
    --blue-dark: #b8d9f8;
    --blue-accent: #5ba4d4;
    --orange: #fff0e0;
    --orange-dark: #ffcc99;
    --orange-accent: #f08040;
    --green: #e8f5e9;
    --green-dark: #c8e6c9;
    --white: #fffcfd;
    --text: #3d2b35;
    --text-light: #7a5c6a;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 20%, #fde8ef88 0%, transparent 50%),
      radial-gradient(ellipse at 90% 10%, #e3f0fd88 0%, transparent 50%),
      radial-gradient(ellipse at 50% 90%, #fff8e188 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, #fff0e055 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 90px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 16px;
    animation: fadeDown 0.8s ease both;
  }

  .header .emoji-row {
    font-size: 26px;
    letter-spacing: 6px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--pink-accent);
    line-height: 1.2;
  }

  .header h1 span {
    font-style: italic;
    color: var(--blue-accent);
  }

  .race-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    border: 2px solid var(--pink-dark);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-top: 12px;
    box-shadow: 0 4px 12px #e0708f25;
  }

  /* Progress */
  .progress-section {
    background: white;
    border-radius: var(--radius);
    padding: 16px 18px;
    margin: 16px 0 0;
    border: 1.5px solid #f5d0dc;
    box-shadow: 0 4px 16px #e0708f10;
    animation: fadeUp 0.8s 0.3s ease both;
  }
  .progress-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    margin-bottom: 8px;
    color: var(--text);
  }
  .progress-bar {
    height: 9px;
    background: var(--pink);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink-accent), var(--blue-accent));
    border-radius: 10px;
    transition: width 0.6s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 5px;
    display: flex;
    justify-content: space-between;
  }

  /* Week nav pills */
  .week-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 14px 0 4px;
    scrollbar-width: none;
  }
  .week-nav::-webkit-scrollbar { display: none; }

  .week-pill {
    flex-shrink: 0;
    padding: 7px 15px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 2px solid transparent;
    background: var(--blue);
    color: var(--text);
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .week-pill:hover, .week-pill.active {
    background: var(--blue-accent);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px #5ba4d440;
  }
  .week-pill.race { background: var(--pink); }
  .week-pill.race:hover, .week-pill.race.active { background: var(--pink-accent); color: white; }
  .week-pill.done-week { background: var(--green); color: var(--text-light); }

  /* Rotate week button */
  .rotate-btn {
    width: 100%;
    margin: 14px 0 0;
    padding: 10px;
    border-radius: 12px;
    border: 2px dashed var(--orange-dark);
    background: var(--orange);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--orange-accent);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .rotate-btn:hover { background: var(--orange-dark); color: white; border-color: var(--orange-accent); }

  /* Week section */
  .week-section {
    margin-top: 18px;
    animation: fadeUp 0.5s ease both;
  }

  .week-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .week-number {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--pink-dark);
    line-height: 1;
    opacity: 0.7;
  }

  .week-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .week-info p {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* Workout card */
  .workout-card {
    background: white;
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 4px 18px #e0708f12;
    border: 1.5px solid #f5dce4;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .workout-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px #e0708f20; }
  .workout-card.done-card { border-color: var(--green-dark); }

  .card-header {
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 11px;
    cursor: pointer;
    user-select: none;
  }

  .day-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
  }

  .day-icon.strength { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); }
  .day-icon.tempo { background: linear-gradient(135deg, var(--yellow), var(--yellow-dark)); }
  .day-icon.hyrox { background: linear-gradient(135deg, var(--orange), var(--orange-dark)); }
  .day-icon.hybrid { background: linear-gradient(135deg, var(--blue), var(--blue-dark)); }
  .day-icon.speed { background: linear-gradient(135deg, #f3e5f5, #e1bee7); }
  .day-icon.rest { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
  .day-icon.race { background: linear-gradient(135deg, var(--pink), var(--yellow)); }
  .day-icon.sim { background: linear-gradient(135deg, var(--orange), var(--pink-dark)); }

  .card-title { flex: 1; }
  .card-title h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .card-title .date-tag {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .time-badge {
    font-size: 11px;
    color: var(--text-light);
    background: var(--yellow);
    border-radius: 20px;
    padding: 4px 10px;
    font-weight: 500;
    white-space: nowrap;
  }

  .chevron {
    font-size: 13px;
    color: var(--pink-accent);
    transition: transform 0.3s ease;
    margin-left: 3px;
  }
  .workout-card.open .chevron { transform: rotate(180deg); }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .workout-card.open .card-body { max-height: 2000px; }

  .card-content {
    padding: 0 16px 16px;
    border-top: 1.5px dashed #f5dce4;
    padding-top: 12px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--pink-accent);
    margin-top: 10px;
    margin-bottom: 5px;
  }
  .section-label:first-child { margin-top: 0; }

  .exercise-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .exercise-list li {
    font-size: 13px;
    color: var(--text);
    padding: 6px 11px;
    background: var(--white);
    border-radius: 9px;
    border: 1px solid #f5dce4;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 7px;
  }

  .exercise-list li::before {
    content: '✿';
    color: var(--pink-accent);
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .rounds-tag {
    display: inline-block;
    background: linear-gradient(135deg, var(--orange), var(--yellow-dark));
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin: 7px 0;
  }

  .rest-note {
    font-size: 12px;
    color: var(--text-light);
    font-style: italic;
    margin-top: 7px;
    padding: 6px 10px;
    background: var(--blue);
    border-radius: 8px;
  }

  .hyrox-sequence {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hyrox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    padding: 5px 10px;
    background: var(--orange);
    border-radius: 9px;
  }
  .hyrox-row .run-tag {
    background: var(--yellow-dark);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .hyrox-row .station { font-weight: 500; color: var(--text); }

  /* Checkbox complete button */
  .complete-btn {
    width: 100%;
    margin-top: 11px;
    padding: 9px;
    border-radius: 11px;
    border: 2px solid var(--pink-dark);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--pink-accent);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .complete-btn:hover { background: var(--pink); }
  .complete-btn.done {
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    border-color: var(--pink-accent);
    color: white;
  }

  /* Race day card */
  .race-day-card {
    background: linear-gradient(135deg, var(--pink) 0%, var(--yellow) 50%, var(--blue) 100%);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    border: 2px solid var(--pink-dark);
    box-shadow: 0 8px 32px #e0708f28;
    margin-bottom: 12px;
  }
  .race-day-card .race-emoji { font-size: 48px; display: block; margin-bottom: 10px; }
  .race-day-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
  }
  .race-day-card p { font-size: 14px; color: var(--text-light); margin-top: 6px; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(255,252,253,0.94);
    backdrop-filter: blur(12px);
    border-top: 1.5px solid #f5d0dc;
    display: flex;
    justify-content: space-around;
    padding: 8px 0 14px;
    z-index: 100;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s ease;
    padding: 2px 14px;
  }
  .nav-btn .nav-icon { font-size: 21px; }
  .nav-btn.active { color: var(--pink-accent); }

  .hidden { display: none !important; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    from { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    to { opacity: 0; transform: translateY(80vh) rotate(720deg); }
  }

  /* Notes tab */
  .notes-area {
    background: white;
    border-radius: var(--radius);
    padding: 18px;
    border: 1.5px solid #f5d0dc;
    margin-top: 20px;
    box-shadow: 0 4px 16px #e0708f10;
  }
  .notes-area h3 { font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 10px; }
  .notes-area textarea {
    width: 100%;
    min-height: 110px;
    border: 1.5px solid #f5d0dc;
    border-radius: 11px;
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    resize: vertical;
    outline: none;
    background: var(--white);
    transition: border-color 0.2s;
  }
  .notes-area textarea:focus { border-color: var(--pink-accent); }

  /* ===== CALENDAR VIEW ===== */
  #view-calendar {
    padding-top: 8px;
  }

  .cal-month {
    margin-top: 18px;
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1.5px solid #f5dce4;
    box-shadow: 0 4px 18px #e0708f10;
    margin-bottom: 20px;
  }

  .cal-month-header {
    padding: 14px 18px 12px;
    background: linear-gradient(135deg, var(--pink), var(--yellow));
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-day-label {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-light);
    padding: 8px 2px 6px;
    letter-spacing: 0.5px;
    background: var(--white);
    border-bottom: 1px solid #f5dce4;
  }

  .cal-cell {
    min-height: 72px;
    border-right: 1px solid #f5dce4;
    border-bottom: 1px solid #f5dce4;
    padding: 5px 4px;
    position: relative;
    background: white;
    cursor: default;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty { background: #fdfbfb; }
  .cal-cell.has-workout { cursor: pointer; }
  .cal-cell.has-workout:hover { background: var(--pink); }

  .cal-date-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .cal-cell.empty .cal-date-num { color: #ddd; }

  .cal-dot {
    width: 100%;
    border-radius: 6px;
    padding: 2px 3px;
    font-size: 9px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 2px;
    text-align: center;
    word-break: break-word;
  }
  .cal-dot.strength { background: var(--pink-dark); color: white; }
  .cal-dot.tempo { background: var(--yellow-dark); }
  .cal-dot.hyrox { background: var(--orange-dark); }
  .cal-dot.hybrid { background: var(--blue-dark); }
  .cal-dot.speed { background: #e1bee7; }
  .cal-dot.rest { background: var(--green-dark); }
  .cal-dot.race { background: linear-gradient(90deg, var(--pink-accent), var(--yellow-accent)); color: white; }
  .cal-dot.sim { background: var(--orange-accent); color: white; }

  .cal-time {
    font-size: 8.5px;
    color: var(--text-light);
    text-align: center;
    margin-top: 1px;
  }

  /* Cal workout detail modal */
  .cal-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(61,43,53,0.45);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .cal-modal {
    background: white;
    width: 100%;
    max-width: 480px;
    border-radius: 22px 22px 0 0;
    padding: 22px 20px 40px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .cal-modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .cal-modal-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    flex: 1;
  }
  .cal-modal-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--pink);
    border: none;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--pink-accent);
  }
  .cal-modal-close:hover { background: var(--pink-dark); color: white; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="emoji-row">🌸 🌼 ☀️ 🌺 🌻</div>
    <h1>My HYROX <span>Training Plan</span></h1>
    <div class="race-badge">🏁 Race Day: Thursday, May 28</div>
  </div>

  <!-- View: Plan -->
  <div id="view-plan">

    <div class="progress-section">
      <h3>✨ Your Progress</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div class="progress-label">
        <span id="progress-text">0 workouts done</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>

    <div class="week-nav" id="week-nav"></div>
    <div id="weeks-container"></div>

  </div>

  <!-- View: Calendar -->
  <div id="view-calendar" class="hidden">
    <div id="calendar-container"></div>
  </div>

  <!-- View: Notes -->
  <div id="view-notes" class="hidden">
    <div class="notes-area" style="margin-top:22px">
      <h3>📓 My Training Notes</h3>
      <textarea id="notes-text" placeholder="Jot down how workouts felt, PRs, how you're feeling... 💕"></textarea>
    </div>
    <div class="notes-area" style="margin-top:14px">
      <h3>🌟 Goals & Mantras</h3>
      <textarea id="goals-text" placeholder="Write your goals, your 'why', your race day mantra... 🏁"></textarea>
    </div>
  </div>

</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showView('plan', this)">
    <span class="nav-icon">🗓️</span> Plan
  </button>
  <button class="nav-btn" onclick="showView('calendar', this)">
    <span class="nav-icon">📅</span> Calendar
  </button>
  <button class="nav-btn" onclick="showView('notes', this)">
    <span class="nav-icon">📓</span> Notes
  </button>
</div>

<script>
const DONE_KEY = 'hyrox_v2_done';
const ORDER_KEY = 'hyrox_v2_order';

// =============================================
// WORKOUT DATA
// =============================================
const allWeeks = [
  {
    id: "w1", num: 1, label: "Week 1", subtitle: "Apr 1–5 · Let's Go! 🌸",
    days: [
      {
        id: "w1d1", type: "strength", icon: "🦵", title: "Lower Strength",
        date: "Wednesday, April 1", isoDate: "2026-04-01", time: "~70 min",
        warmup: ["10 min warmup"],
        exercises: [
          "Back Squat: 4×6 @ 155–175 lbs (2 min rest)",
          "Walking Lunges: 3×20 steps @ 30 lb DBs",
          "RDL: 3×10 @ 115–135 lbs",
          "Sled Push: 4×20m @ 3 plates/side",
          "Plank: 3×60 sec"
        ],
        cooldown: "10 min cooldown"
      },
      {
        id: "w1d2", type: "tempo", icon: "🏃‍♀️", title: "Tempo Run",
        date: "Thursday, April 2", isoDate: "2026-04-02", time: "~60 min",
        warmup: ["10 min warmup"],
        exercises: [
          "Run: 3 mi @ 9:45–10:00/mile",
          "SkiErg: 3×500m @ 2:15–2:25 pace (90 sec rest)",
          "Farmers Carry: 3×40m @ 40–45 lbs"
        ],
        cooldown: "Cooldown stretch"
      },

// =============================================
// STATE
// =============================================
let done = {};
let weekOrder = [];

try { done = JSON.parse(localStorage.getItem(DONE_KEY)) || {}; } catch(e) {}
try {
  const savedOrder = JSON.parse(localStorage.getItem(ORDER_KEY));
  if (savedOrder && savedOrder.length === allWeeks.length) {
    weekOrder = savedOrder;
  } else {
    weekOrder = allWeeks.map(w => w.id);
  }
} catch(e) {
  weekOrder = allWeeks.map(w => w.id);
}

function getOrderedWeeks() {
  return weekOrder.map(id => allWeeks.find(w => w.id === id)).filter(Boolean);
}

function saveOrder() {
  try { localStorage.setItem(ORDER_KEY, JSON.stringify(weekOrder)); } catch(e) {}
}

function saveDone() {
  try { localStorage.setItem(DONE_KEY, JSON.stringify(done)); } catch(e) {}
  updateProgress();
}

// =============================================
// PROGRESS
// =============================================
function updateProgress() {
  const total = allWeeks.reduce((a, w) => a + w.days.filter(d => d.type !== 'rest' && d.type !== 'race').length, 0);
  const completed = Object.values(done).filter(Boolean).length;
  const pct = Math.round((completed / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = completed + ' workouts done';
  document.getElementById('progress-pct').textContent = pct + '%';
}

// =============================================
// RENDER WEEKS
// =============================================
let activeWeekIndex = 0;

function renderWeeks() {
  const nav = document.getElementById('week-nav');
  const container = document.getElementById('weeks-container');
  nav.innerHTML = '';
  container.innerHTML = '';

  const ordered = getOrderedWeeks();

  ordered.forEach((week, wi) => {
    // Nav pill
    const pill = document.createElement('button');
    const allDone = week.days.filter(d => d.type !== 'rest' && d.type !== 'race').every(d => done[d.id]);
    pill.className = 'week-pill' + (week.isRaceWeek ? ' race' : '') + (allDone ? ' done-week' : '') + (wi === 0 ? ' active' : '');
    pill.textContent = week.label;
    pill.onclick = () => {
      document.querySelectorAll('.week-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.querySelectorAll('.week-section').forEach(s => s.classList.add('hidden'));
      document.getElementById('week-' + wi).classList.remove('hidden');
      document.getElementById('week-' + wi).scrollIntoView({behavior: 'smooth', block: 'start'});
    };
    nav.appendChild(pill);

    // Week section
    const section = document.createElement('div');
    section.className = 'week-section' + (wi > 0 ? ' hidden' : '');
    section.id = 'week-' + wi;

    let html = `<div class="week-header">
      <div class="week-number">${week.isRaceWeek ? '🏁' : week.num}</div>
      <div class="week-info">
        <h2>${week.label}</h2>
        <p>${week.subtitle}</p>
      </div>
    </div>`;

    week.days.forEach(day => {
      if (day.type === 'race') {
        html += `<div class="race-day-card">
          <span class="race-emoji">🏁</span>
          <h2>HYROX Race Day!</h2>
          <p>${day.date}</p>
          <p style="margin-top:10px; font-size:15px; font-weight:600; color:var(--pink-accent)">${day.notes}</p>
        </div>`;
        return;
      }

      const isDone = done[day.id];
      const isRest = day.type === 'rest';

      html += `<div class="workout-card${isDone ? ' done-card' : ''}" id="card-${day.id}" ${!isRest ? `onclick="toggleCard('${day.id}')"` : ''}>
        <div class="card-header">
          <div class="day-icon ${day.type}">${day.icon}</div>
          <div class="card-title">
            <h3>${day.title}</h3>
            <div class="date-tag">📅 ${day.date}</div>
          </div>
          <div class="time-badge">⏱ ${day.time}</div>
          ${!isRest ? '<span class="chevron">▾</span>' : ''}
        </div>`;

      if (!isRest) {
        html += `<div class="card-body"><div class="card-content">`;

        if (day.warmup) {
          html += `<div class="section-label">Warmup</div><ul class="exercise-list">`;
          day.warmup.forEach(w => { html += `<li>${w}</li>`; });
          html += `</ul>`;
        }

        if (day.hyrox) {
          html += `<div class="section-label">Sequence</div>`;
          if (day.rounds) html += `<div class="rounds-tag">🔄 ${day.rounds}</div>`;
          html += `<div class="hyrox-sequence">`;
          day.hyrox.forEach(r => {
            if (r.run) {
              html += `<div class="hyrox-row"><span class="run-tag">🏃 ${r.run}</span><span class="station">→ ${r.station}</span></div>`;
            } else {
              html += `<div class="hyrox-row" style="padding-left:20px"><span class="station">→ ${r.station}</span></div>`;
            }
          });
          html += `</div>`;
        } else if (day.exercises) {
          if (day.rounds) html += `<div class="rounds-tag">🔄 ${day.rounds}</div>`;
          html += `<ul class="exercise-list">`;
          day.exercises.forEach(e => { html += `<li>${e}</li>`; });
          html += `</ul>`;
        }

        if (day.cooldown) html += `<div class="rest-note">🧊 ${day.cooldown}</div>`;
        if (day.rest) html += `<div class="rest-note">💙 ${day.rest}</div>`;
        if (day.notes) html += `<div class="rest-note">✨ ${day.notes}</div>`;

        html += `<button class="complete-btn ${isDone ? 'done' : ''}" id="btn-${day.id}" onclick="event.stopPropagation(); markDone('${day.id}')">
          ${isDone ? '✅ Completed! You crushed it!' : '☐ Mark as done'}
        </button>`;

        html += `</div></div>`;
      } else {
        if (day.notes) html += `<div style="padding: 0 16px 12px; font-size:13px; color:var(--text-light);">${day.notes}</div>`;
      }

      html += `</div>`;
    });

    // Rotate button
    if (!week.isRaceWeek) {
      html += `<button class="rotate-btn" onclick="rotateWeekToEnd(${wi})">
        ✅ Week ${week.num} Complete — Move to End
      </button>`;
    }

    section.innerHTML = html;
    container.appendChild(section);
  });

  updateProgress();
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function markDone(id) {
  done[id] = !done[id];
  saveDone();
  const btn = document.getElementById('btn-' + id);
  btn.textContent = done[id] ? '✅ Completed! You crushed it!' : '☐ Mark as done';
  btn.className = 'complete-btn' + (done[id] ? ' done' : '');
  const card = document.getElementById('card-' + id);
  if (done[id]) { card.classList.add('done-card'); spawnConfetti(btn); }
  else { card.classList.remove('done-card'); }
}

function rotateWeekToEnd(visibleIndex) {
  const weekId = weekOrder[visibleIndex];
  weekOrder.splice(visibleIndex, 1);
  weekOrder.push(weekId);
  saveOrder();
  renderWeeks();
  // scroll to top of plan
  document.getElementById('weeks-container').scrollIntoView({behavior:'smooth', block:'start'});
}

function spawnConfetti(btn) {
  const colors = ['#fde8ef','#ffe082','#b8d9f8','#e0708f','#5ba4d4','#ffcc99','#c8e6c9'];
  const rect = btn.getBoundingClientRect();
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${rect.left + rect.width/2 + (Math.random()-0.5)*80}px;
      top: ${rect.top}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay: ${Math.random()*0.3}s;
      transform: rotate(${Math.random()*360}deg);
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

// =============================================
// CALENDAR VIEW
// =============================================
function buildCalendarDayMap() {
  const map = {};
  allWeeks.forEach(week => {
    week.days.forEach(day => {
      if (day.isoDate) {
        map[day.isoDate] = day;
      }
    });
  });
  return map;
}

function renderCalendar() {
  const container = document.getElementById('calendar-container');
  container.innerHTML = '';

  const dayMap = buildCalendarDayMap();
  const months = [
    { year: 2026, month: 3, name: 'April 2026', emoji: '🌸' },
    { year: 2026, month: 4, name: 'May 2026', emoji: '🌻' }
  ];

  months.forEach(({ year, month, name, emoji }) => {
    const monthEl = document.createElement('div');
    monthEl.className = 'cal-month';

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startDow = firstDay.getDay(); // 0=sun
    const totalDays = lastDay.getDate();

    let html = `<div class="cal-month-header">${emoji} ${name}</div>
    <div class="cal-grid">
      <div class="cal-day-label">Sun</div>
      <div class="cal-day-label">Mon</div>
      <div class="cal-day-label">Tue</div>
      <div class="cal-day-label">Wed</div>
      <div class="cal-day-label">Thu</div>
      <div class="cal-day-label">Fri</div>
      <div class="cal-day-label">Sat</div>`;

    // Empty cells before start
    for (let i = 0; i < startDow; i++) {
      html += `<div class="cal-cell empty"><div class="cal-date-num"></div></div>`;
    }

    for (let d = 1; d <= totalDays; d++) {
      const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const day = dayMap[iso];
      const hasWorkout = day && day.type !== 'rest';

      if (day) {
        const shortTitle = day.type === 'race' ? '🏁 RACE!' : shortWorkoutName(day);
        html += `<div class="cal-cell${hasWorkout ? ' has-workout' : ''}" ${hasWorkout ? `onclick="showCalModal('${iso}')"` : ''}>
          <div class="cal-date-num">${d}</div>
          <div class="cal-dot ${day.type}">${shortTitle}</div>
          <div class="cal-time">${day.time}</div>
        </div>`;
      } else {
        html += `<div class="cal-cell"><div class="cal-date-num">${d}</div></div>`;
      }
    }

    // Fill remaining cells
    const totalCells = startDow + totalDays;
    const remainder = totalCells % 7;
    if (remainder !== 0) {
      for (let i = 0; i < 7 - remainder; i++) {
        html += `<div class="cal-cell empty"><div class="cal-date-num"></div></div>`;
      }
    }

    html += `</div>`;
    monthEl.innerHTML = html;
    container.appendChild(monthEl);
  });
}

function shortWorkoutName(day) {
  const map = {
    strength: '💪 Strength',
    tempo: '🏃 Tempo',
    hyrox: '🔥 HYROX',
    hybrid: '💙 Hybrid',
    speed: '⚡ Speed',
    sim: '🔥 Sim',
    rest: '🌸 Rest'
  };
  return map[day.type] || day.title;
}

function showCalModal(iso) {
  const dayMap = buildCalendarDayMap();
  const day = dayMap[iso];
  if (!day) return;

  const overlay = document.createElement('div');
  overlay.className = 'cal-modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  let detail = '';
  if (day.warmup) detail += `<div class="section-label">Warmup</div><ul class="exercise-list">${day.warmup.map(w => `<li>${w}</li>`).join('')}</ul>`;
  if (day.hyrox) {
    detail += `<div class="section-label">Sequence</div>`;
    if (day.rounds) detail += `<div class="rounds-tag">🔄 ${day.rounds}</div>`;
    detail += `<div class="hyrox-sequence">`;
    day.hyrox.forEach(r => {
      if (r.run) detail += `<div class="hyrox-row"><span class="run-tag">🏃 ${r.run}</span><span class="station">→ ${r.station}</span></div>`;
      else detail += `<div class="hyrox-row" style="padding-left:20px"><span class="station">→ ${r.station}</span></div>`;
    });
    detail += `</div>`;
  } else if (day.exercises) {
    if (day.rounds) detail += `<div class="rounds-tag">🔄 ${day.rounds}</div>`;
    detail += `<ul class="exercise-list">${day.exercises.map(e => `<li>${e}</li>`).join('')}</ul>`;
  }
  if (day.cooldown) detail += `<div class="rest-note">🧊 ${day.cooldown}</div>`;
  if (day.rest) detail += `<div class="rest-note">💙 ${day.rest}</div>`;
  if (day.notes) detail += `<div class="rest-note">✨ ${day.notes}</div>`;

  overlay.innerHTML = `<div class="cal-modal">
    <div class="cal-modal-header">
      <div class="day-icon ${day.type}" style="width:38px;height:38px;font-size:17px">${day.icon}</div>
      <h3>${day.title}</h3>
      <button class="cal-modal-close" onclick="this.closest('.cal-modal-overlay').remove()">✕</button>
    </div>
    <div class="date-tag" style="margin-bottom:10px">📅 ${day.date} &nbsp;|&nbsp; ⏱ ${day.time}</div>
    ${detail}
  </div>`;

  document.body.appendChild(overlay);
}

// =============================================
// NAVIGATION
// =============================================
function showView(view, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-plan').classList.toggle('hidden', view !== 'plan');
  document.getElementById('view-calendar').classList.toggle('hidden', view !== 'calendar');
  document.getElementById('view-notes').classList.toggle('hidden', view !== 'notes');
  if (view === 'calendar') renderCalendar();
}

// =============================================
// NOTES PERSISTENCE
// =============================================
function initNotes() {
  const ta = document.getElementById('notes-text');
  const ga = document.getElementById('goals-text');
  try {
    ta.value = localStorage.getItem('hyrox_v2_notes') || '';
    ga.value = localStorage.getItem('hyrox_v2_goals') || '';
  } catch(e) {}
  ta.addEventListener('input', () => { try { localStorage.setItem('hyrox_v2_notes', ta.value); } catch(e) {} });
  ga.addEventListener('input', () => { try { localStorage.setItem('hyrox_v2_goals', ga.value); } catch(e) {} });
}

// =============================================
// INIT
// =============================================
renderWeeks();
initNotes();
</script>
</body>
</html>
