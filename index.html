<div class="photo-gallery">
    <h2>Photo Gallery</h2>
    <div id="masonry-grid"></div>
</div>
<style>
.photo-gallery {
    display: block;
    margin: 20px 0;
}

#masonry-grid {
    display: flex;
    flex-wrap: wrap;
}

.photo-item {
    position: relative;
    margin: 5px;
}

.photo-item img {
    width: 100%;
    height: auto;
    border-radius: 8px;
}

.photo-title {
    text-align: center;
    margin-top: 5px;
}

.photo-item .delete-button {
    position: absolute;
    top: 5px;
    right: 5px;
}
</style>
<script>
// Store photos in localStorage
function addPhoto(workoutId, date, title, base64Image) {
    const photos = JSON.parse(localStorage.getItem('photos')) || {};
    photos[workoutId] = { date, title, image: base64Image };
    localStorage.setItem('photos', JSON.stringify(photos));
}

// Display photos shuffled
function displayPhotos() {
    const photos = JSON.parse(localStorage.getItem('photos')) || {};
    const photoKeys = Object.keys(photos).sort(() => Math.random() - 0.5);
    const grid = document.getElementById('masonry-grid');
    grid.innerHTML = ''; // clear existing photos

    photoKeys.forEach(key => {
        const { date, title, image } = photos[key];
        const photoItem = document.createElement('div');
        photoItem.className = 'photo-item';
        photoItem.innerHTML = `
            <img src="${image}" alt="${title}">
            <div class="photo-title">${title} - ${date}</div>
            <button class="delete-button" onclick="deletePhoto('${key}')">Delete</button>
        `;
        grid.appendChild(photoItem);
    });
}

// Delete photo
function deletePhoto(workoutId) {
    const photos = JSON.parse(localStorage.getItem('photos'));
    delete photos[workoutId];
    localStorage.setItem('photos', JSON.stringify(photos));
    displayPhotos();
}

    // Call addPhoto() function after photo is captured/uploaded
}
</script>
